<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>夜市人生 · 台語金句長輩圖學習站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nm: {
                            cream: '#fff8e1',
                            yellow: '#ffeb3b',
                            gold: '#ffc107',
                            red: '#d32f2f',
                            pink: '#e91e63',
                            orange: '#ff6f00',
                            green: '#2e7d32',
                            teal: '#00897b',
                            brown: '#4e342e',
                            panel: '#fffdf5'
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        meme: ['"Noto Sans TC"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Long+Cang&family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --nm-cream: #fff8e1;
            --nm-yellow: #ffeb3b;
            --nm-gold: #ffc107;
            --nm-red: #d32f2f;
            --nm-pink: #e91e63;
            --nm-orange: #ff6f00;
            --nm-green: #2e7d32;
            --nm-teal: #00897b;
            --nm-brown: #4e342e;
            --nm-border: 3px solid var(--nm-red);
            --nm-shadow: 4px 4px 0 rgba(78, 52, 46, 0.25);
        }

        * { box-sizing: border-box; }

        html { font-size: 18px; }

        .text-xs { font-size: 15px !important; line-height: 23px !important; }
        .text-sm { font-size: 17px !important; line-height: 26px !important; }
        .text-base { font-size: 18px !important; }
        .text-lg { font-size: 22px !important; line-height: 30px !important; }
        .text-2xl { font-size: 27px !important; }
        .text-3xl { font-size: 34px !important; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--nm-brown);
            min-height: 100vh;
            background-color: var(--nm-cream);
            background-image:
                radial-gradient(circle at 20% 15%, rgba(255, 193, 7, 0.35) 0%, transparent 42%),
                radial-gradient(circle at 85% 75%, rgba(233, 30, 99, 0.12) 0%, transparent 38%),
                repeating-linear-gradient(
                    -12deg,
                    transparent,
                    transparent 28px,
                    rgba(255, 111, 0, 0.04) 28px,
                    rgba(255, 111, 0, 0.04) 56px
                );
        }

        .nm-bg-deco {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .nm-bg-deco span {
            position: absolute;
            font-size: 45px;
            opacity: 0.12;
            filter: saturate(1.4);
        }
        .nm-bg-deco .deco-1 { top: 8%; left: 4%; transform: rotate(-15deg); }
        .nm-bg-deco .deco-2 { top: 18%; right: 6%; font-size: 36px; }
        .nm-bg-deco .deco-3 { bottom: 22%; left: 8%; font-size: 32px; }
        .nm-bg-deco .deco-4 { bottom: 12%; right: 10%; transform: rotate(12deg); }
        .nm-bg-deco .deco-5 { top: 45%; left: 2%; font-size: 27px; opacity: 0.08; }

        .nm-page { position: relative; z-index: 1; }

        .meme-title {
            font-family: 'Ma Shan Zheng', 'Long Cang', cursive;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: var(--nm-red);
            text-shadow:
                2px 2px 0 #fff,
                3px 3px 0 var(--nm-gold),
                4px 4px 0 rgba(211, 47, 47, 0.35);
        }

        .site-title-logo {
            display: block;
            width: min(200px, 36vw);
            height: auto;
            object-fit: contain;
        }

        .header-brand-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            min-width: 0;
        }
        .header-logo-wrap {
            flex-shrink: 0;
            line-height: 0;
        }
        .header-search-col {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            height: calc(min(200px, 36vw) * 116 / 300);
        }
        .header-search-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            min-width: 0;
        }
        .header-search-row .header-search-bar {
            flex: 1;
            min-width: 0;
        }
        .header-search-bar {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin: 0;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 9999px;
            box-shadow: 0 2px 8px rgba(78, 52, 46, 0.08);
            padding: 0.2rem 0.3rem 0.2rem 0.75rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .header-search-bar:focus-within {
            border-color: var(--nm-red);
            box-shadow: 0 2px 14px rgba(211, 47, 47, 0.18);
        }
        .header-search-bar > i {
            color: #9e9e9e;
            font-size: 14px;
            flex-shrink: 0;
        }
        .header-search-input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 15px;
            line-height: 1.3;
            color: var(--nm-brown);
        }
        .header-search-input::placeholder {
            color: #9e9e9e;
        }
        .header-search-btn {
            flex-shrink: 0;
            border: none;
            border-radius: 9999px;
            background: var(--nm-red);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px;
            font-weight: 800;
            padding: 0.3rem 0.75rem;
            cursor: pointer;
            transition: filter 0.15s;
        }
        .header-search-btn:hover { filter: brightness(1.08); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .header-actions .nm-badge {
            font-size: 13px;
            padding: 0.25rem 0.65rem;
        }
        .header-actions .nm-btn-primary {
            font-size: 13px;
            padding: 0.35rem 0.75rem;
        }

        @media (max-width: 640px) {
            .header-brand-row {
                flex-direction: column;
                gap: 0.65rem;
            }
            .header-search-col {
                height: auto;
                margin-top: 0;
                padding-bottom: 0;
            }
            .header-search-row {
                flex-wrap: wrap;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        .nm-awning {
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                var(--nm-red) 0,
                var(--nm-red) 24px,
                var(--nm-yellow) 24px,
                var(--nm-yellow) 48px,
                var(--nm-green) 48px,
                var(--nm-green) 72px
            );
        }

        .nm-header {
            background: linear-gradient(180deg, #fff9c4 0%, #ffecb3 55%, #ffe082 100%);
            border-bottom: var(--nm-border);
            box-shadow: var(--nm-shadow);
        }

        .nm-panel {
            background: var(--nm-panel);
            border: var(--nm-border);
            border-radius: 1rem;
            box-shadow: var(--nm-shadow);
            position: relative;
        }
        .nm-panel::before,
        .nm-panel::after {
            content: '✿';
            position: absolute;
            font-size: 15px;
            color: var(--nm-pink);
            opacity: 0.55;
        }
        .nm-panel::before { top: 8px; left: 10px; }
        .nm-panel::after { bottom: 8px; right: 10px; }

        .nm-panel-inner {
            background: #fff;
            border: 2px dashed var(--nm-orange);
            border-radius: 0.75rem;
        }

        .nm-label {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--nm-teal);
        }

        .nm-input,
        .nm-select {
            background: #fff;
            border: 2px solid var(--nm-brown);
            border-radius: 0.65rem;
            color: var(--nm-brown);
            font-size: 18px;
        }
        .nm-input:focus,
        .nm-select:focus {
            outline: none;
            border-color: var(--nm-red);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.2);
        }

        .nm-chip {
            background: #fff;
            border: 2px solid var(--nm-brown);
            color: var(--nm-brown);
            font-weight: 700;
            transition: transform 0.15s, background 0.15s, color 0.15s;
        }
        .nm-chip:hover {
            background: #fff9c4;
            transform: translateY(-1px);
        }
        .nm-chip.is-active {
            background: var(--nm-red);
            border-color: var(--nm-red);
            color: #fff;
            box-shadow: 2px 2px 0 var(--nm-gold);
        }

        .nm-btn-primary {
            background: linear-gradient(180deg, var(--nm-pink) 0%, var(--nm-red) 100%);
            border: 2px solid #b71c1c;
            color: #fff;
            font-weight: 900;
            box-shadow: 3px 3px 0 var(--nm-gold);
        }
        .nm-btn-primary:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .nm-btn-primary:active { transform: translateY(1px); box-shadow: 1px 1px 0 var(--nm-gold); }

        .nm-btn-secondary {
            background: #fff;
            border: 2px solid var(--nm-teal);
            color: var(--nm-teal);
            font-weight: 800;
        }
        .nm-btn-secondary:hover { background: #e0f2f1; }

        .nm-badge {
            background: var(--nm-green);
            border: 2px solid #1b5e20;
            color: #fff;
            font-weight: 800;
        }

        .nm-hero-banner {
            background: linear-gradient(135deg, #fff59d 0%, #ffcc80 50%, #ffab91 100%);
            border: var(--nm-border);
            border-radius: 1rem;
            box-shadow: var(--nm-shadow);
        }

        .nm-video-frame {
            border: 4px solid #fff;
            outline: 3px solid var(--nm-red);
            border-radius: 0.75rem;
            box-shadow: 6px 6px 0 rgba(211, 47, 47, 0.35);
            overflow: hidden;
        }

        .nm-video-frame iframe,
        .nm-video-frame #youtube-player {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .youtube-preview-link {
            display: block;
            position: relative;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: inherit;
        }

        .youtube-preview-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .youtube-preview-play {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(to top, rgba(78, 52, 46, 0.65), rgba(78, 52, 46, 0.15));
            color: #fff;
        }

        .youtube-preview-play .nm-play-btn {
            position: static;
            margin: 0;
        }

        .youtube-preview-time {
            font-size: 14px;
            font-weight: 800;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .quote-card-text {
            position: relative;
            background: #fff9c4;
            border-radius: 0.5rem;
            padding: 0.6rem 0.75rem;
            text-align: center;
            flex: 1;
            min-width: 0;
        }
        .card-download-btn {
            position: absolute;
            top: 0.25rem;
            right: 0.35rem;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
        }
        .card-nav-row {
            display: flex;
            align-items: stretch;
            gap: 0.5rem;
        }
        .card-nav-btn {
            flex-shrink: 0;
            align-self: center;
            padding: 0.4rem 0.45rem;
            border: 2px solid var(--nm-brown);
            border-radius: 0.5rem;
            background: #fff;
            font-size: 14px;
            font-weight: 800;
            color: var(--nm-teal);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
            line-height: 1.3;
            white-space: nowrap;
        }
        .card-nav-btn:hover:not(:disabled) {
            background: #fff9c4;
            color: var(--nm-red);
            border-color: var(--nm-red);
        }
        .card-nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .video-section {
            padding-top: 0.45rem;
            border-top: 2px dashed var(--nm-orange);
        }
        .deep-analysis-section {
            padding-top: 1rem;
            border-top: 2px dashed var(--nm-orange);
        }
        .video-section-header {
            margin-bottom: 0.35rem;
        }
        .video-time-label {
            font-size: 13px;
            font-weight: 700;
            color: #6d4c41;
            line-height: 1.3;
        }
        .quote-card-text .search-result-tw {
            font-size: 18px;
            line-height: 1.5;
            margin: 0;
        }
        .quote-card-text .search-result-rom,
        .quote-card-text .search-result-zh {
            font-size: 16px;
            line-height: 1.45;
            margin: 0.3rem 0 0;
        }
        .card-canvas-hidden {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .nm-section-title {
            font-weight: 900;
            color: var(--nm-red);
        }
        .nm-section-title i { color: var(--nm-orange); }

        .nm-muted { color: #6d4c41; }
        .nm-accent-text { color: var(--nm-teal); font-weight: 800; }
        .nm-accent-text-2 { color: var(--nm-pink); font-weight: 800; }

        .nm-footer {
            background: linear-gradient(180deg, #ffecb3, #ffe082);
            border-top: var(--nm-border);
            color: var(--nm-brown);
            padding: 0.35rem 1rem;
            flex-shrink: 0;
        }
        .nm-footer p {
            margin: 0;
            line-height: 1.35;
        }
        .site-caption {
            font-weight: 400;
            color: var(--nm-brown);
            letter-spacing: 0.02em;
        }

        .nm-toast {
            background: var(--nm-green);
            border: 3px solid #1b5e20;
            color: #fff;
            box-shadow: var(--nm-shadow);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #ffecb3; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--nm-red), var(--nm-orange));
            border-radius: 6px;
            border: 2px solid #fff;
        }

        .video-frame { width: min(11in, 100%); max-width: 11in; margin-left: auto; margin-right: auto; }

        .drama-世間情 { background: #7c3aed; color: #fff; border: 2px solid #fff; }
        .drama-台灣霹靂火 { background: #dc2626; color: #fff; border: 2px solid #fff; }
        .drama-意難忘 { background: #d97706; color: #fff; border: 2px solid #fff; }
        .drama-夜市人生 {
            background: linear-gradient(135deg, var(--nm-green), var(--nm-teal));
            color: #fff;
            border: 2px solid var(--nm-yellow);
            box-shadow: 2px 2px 0 var(--nm-red);
        }
        .drama-台灣龍捲風 { background: #0891b2; color: #fff; border: 2px solid #fff; }

        .quote-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 2px solid var(--nm-brown);
            font-weight: 800;
            line-height: 1.2;
            white-space: nowrap;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        }
        .quote-tag.size-lg { font-size: 16px; padding: 0.4rem 0.8rem; }
        .quote-tag.size-md { font-size: 15px; padding: 0.35rem 0.7rem; }
        .quote-tag.size-sm { font-size: 14px; padding: 0.3rem 0.55rem; }
        .quote-tag.kind-default { background: #fff; color: var(--nm-brown); }
        .quote-tag.kind-diff { background: #fff9c4; color: #f57f17; border-color: var(--nm-gold); }
        .quote-tag.kind-tone { background: #fce4ec; color: var(--nm-pink); border-color: var(--nm-pink); }
        .quote-tag.kind-context { background: #e8f5e9; color: var(--nm-green); border-color: var(--nm-green); }

        .nm-play-btn {
            background: var(--nm-red);
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px var(--nm-red), 4px 4px 0 var(--nm-gold);
        }

        #view-learn { display: flex; flex-direction: column; min-height: 100vh; }

        .page-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            align-items: stretch;
        }

        .grammar-sidebar {
            flex-shrink: 0;
            width: 17.5rem;
            background: var(--nm-panel);
            border-right: var(--nm-border);
            box-shadow: var(--nm-shadow);
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease;
            position: sticky;
            top: 0;
            align-self: flex-start;
            max-height: calc(100vh - 5.5rem);
            overflow: hidden;
            z-index: 30;
        }
        .grammar-sidebar.is-collapsed {
            width: 3rem;
        }
        .grammar-sidebar.is-collapsed .sidebar-body,
        .grammar-sidebar.is-collapsed .sidebar-header-text,
        .grammar-sidebar.is-collapsed .sidebar-header-actions {
            display: none;
        }
        .grammar-sidebar.is-collapsed .sidebar-collapsed-strip {
            display: flex;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.85rem 0.75rem;
            border-bottom: 2px dashed var(--nm-orange);
            background: linear-gradient(180deg, #fff9c4, #ffecb3);
            flex-shrink: 0;
        }
        .sidebar-header-text {
            font-weight: 900;
            color: var(--nm-red);
            font-size: 17px;
            line-height: 1.2;
        }
        .sidebar-toggle-btn {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            border: 2px solid var(--nm-brown);
            background: #fff;
            color: var(--nm-brown);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.15s;
        }
        .sidebar-toggle-btn:hover {
            background: #fff9c4;
            transform: translateY(-1px);
        }

        .sidebar-collapsed-strip {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 0;
            gap: 1rem;
            flex: 1;
        }
        .sidebar-collapsed-strip button {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: 800;
            font-size: 14px;
            color: var(--nm-teal);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.08em;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 0;
            margin: 0;
            border: none;
            background: transparent;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .grammar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .grammar-cat {
            border: 2px solid #bcaaa4;
            border-radius: 0.65rem;
            background: #fff;
            overflow: hidden;
        }
        .grammar-cat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.35rem;
            padding: 0.55rem 0.65rem;
            background: #fffde7;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            color: var(--nm-brown);
            text-align: left;
        }
        .grammar-cat-btn:hover { background: #fff9c4; }
        .grammar-cat-btn .cat-en {
            font-size: 12px;
            font-weight: 700;
            color: var(--nm-teal);
            opacity: 0.85;
        }
        .grammar-cat-btn .cat-chevron {
            transition: transform 0.2s;
            color: var(--nm-orange);
            font-size: 13px;
        }
        .grammar-cat.is-open .cat-chevron { transform: rotate(180deg); }
        .grammar-cat-items {
            display: none;
            flex-direction: column;
            gap: 0.25rem;
            padding: 0.35rem 0.45rem 0.5rem;
            border-top: 1px dashed var(--nm-orange);
        }
        .grammar-cat.is-open .grammar-cat-items { display: flex; }

        .grammar-check {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.45rem;
            border: none;
            border-radius: 0.35rem;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            font-weight: 700;
            color: var(--nm-brown);
            transition: background 0.15s;
        }
        .grammar-check:hover { background: #fff9c4; }
        .grammar-check-box {
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--nm-brown);
            border-radius: 0.2rem;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .grammar-check.is-checked .grammar-check-box {
            background: var(--nm-red);
            border-color: var(--nm-red);
            box-shadow: 1px 1px 0 var(--nm-gold);
        }
        .grammar-check-box::after {
            content: '';
            display: block;
            width: 0.28rem;
            height: 0.5rem;
            border: solid #fff;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) translate(-0.5px, -1px);
            opacity: 0;
            transition: opacity 0.12s;
        }

    <div id="toast-box" class="nm-toast fixed bottom-6 right-6 translate-y-20 opacity-0 transition-all duration-300 font-bold py-3 px-6 rounded-2xl z-50 flex items-center gap-2">

        <span id="toast-message">操作成功</span>

    <script src="drama-quotes-data.js"></script>
    <script>
        const GRAMMAR_MENU = [
            {
                id: 'syntax', label: '句型結構', en: 'Syntax',
                items: [
                    { id: 'kā-disposal', label: '「共」：處置' },
                    { id: 'kā-target', label: '「共」：對象' },
                    { id: 'hōo-passive', label: '「予」：被動' },
                    { id: 'hōo-causative', label: '「予」：使役' },
                    { id: 'comparative', label: '「較」：比較' },
                    { id: 'potential', label: '「袂」：可能' },
                    { id: 'extent-comp', label: '「甲」：程度' },
                    { id: 'conditionals', label: '「若」：假設' }
                ]
            },
            {
                id: 'semantics', label: '詞彙與時態', en: 'Semantics',
                items: [
                    { id: 'aspect-perf', label: '「矣」：完成' },
                    { id: 'aspect-cont', label: '「咧」：持續' },
                    { id: 'aspect-neg', label: '「未」：否定' },
                    { id: 'modal-neg', label: '「莫」：禁止' },
                    { id: 'diminutive-a', label: '「仔」：指小' },
                    { id: 'directional', label: '「趨向」：複合' }
                ]
            },
            {
                id: 'phonology', label: '發音與變調', en: 'Phonology',
                items: [
                    { id: 'neutral-tone', label: '「--」：輕聲' },
                    { id: 'contraction', label: '「合音」：緊縮' },
                    { id: 'reduplication', label: '「疊詞」：變調' },
                    { id: 'checked-tone', label: '「入聲」：急促音' },
                    { id: 'literary-coll', label: '「文白」：兩讀' }
                ]
            }
        ];

        const PRAGMATICS_MENU = [
            { id: 'prag-angry', label: '嗆聲' },
            { id: 'prag-sad', label: '哀怨' },
            { id: 'prag-happy', label: '歡喜' },
            { id: 'prag-sarcasm', label: '激刺' },
            { id: 'prag-shock', label: '驚惶' },
            { id: 'prag-idiom', label: '俗語' }
        ];

        const LT_LABELS = Object.fromEntries([
            ...GRAMMAR_MENU.flatMap(c => c.items.map(i => [i.id, i.label])),
            ...PRAGMATICS_MENU.map(i => [i.id, i.label])
        ]);

        const LT_CATEGORY = Object.fromEntries([
            ...GRAMMAR_MENU.flatMap(c => c.items.map(i => [i.id, c.id])),
            ...PRAGMATICS_MENU.map(i => [i.id, 'pragmatics'])
        ]);

        function getTagCategoryClass(tid) {
            return `cat-${LT_CATEGORY[tid] || 'syntax'}`;
        }

        function renderLinguisticTagChips(quote) {
            const tagIds = getLinguisticTags(quote);
            if (!tagIds.length) return '';
            return tagIds.map(tid => {
                const label = LT_LABELS[tid] || tid;
                return `<span class="grammar-index-chip ${getTagCategoryClass(tid)}" title="${tid}">${label}</span>`;
            }).join('');
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function parseAnalysisSections(text) {
            if (!text) return [];
            const sections = [];
            const re = /【([^】]+)】([^【]*)/g;
            let match;
            while ((match = re.exec(text)) !== null) {
                const term = match[1].trim();
                const body = match[2].trim();
                if (term || body) sections.push({ term, body });
            }
            if (!sections.length && text.trim()) {
                return [{ term: '解析', body: text.trim() }];
            }
            return sections;
        }

        function getAnalysisCategoryClass(term) {
            const normalized = (term || '').trim();
            for (const [id, label] of Object.entries(LT_LABELS)) {
                if (label === normalized) return getTagCategoryClass(id);
            }
            for (const item of PRAGMATICS_MENU) {
                if (item.label === normalized) return getTagCategoryClass(item.id);
            }
            return 'cat-syntax';
        }

        function renderDeepDiveTable(quote) {
            const container = document.getElementById('deep-dive-content');
            if (!container) return;
            const raw = quote.deepDive || quote.explanation || quote.grammar || '';
            const rows = parseAnalysisSections(raw);
            if (!rows.length) {
                container.innerHTML = '<p class="analysis-empty">（尚無深度分析資料）</p>';
                return;
            }
            const bodyRows = rows.map(({ term, body }) => {
                const catClass = getAnalysisCategoryClass(term);
                return `<tr>
                    <th scope="row" class="analysis-term ${catClass}">${escapeHtml(term)}</th>
                    <td class="analysis-body">${escapeHtml(body)}</td>
                </tr>`;
            }).join('');
            container.innerHTML = `
                <table class="analysis-table">
                    <thead>
                        <tr>
                            <th scope="col">考點</th>
                            <th scope="col">解析</th>
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                </table>
            `;
        }

        function getItemSearchHaystack(item) {
            const tagIds = getLinguisticTags(item);
            const tagLabels = tagIds.map(t => LT_LABELS[t] || t);
            const indexParts = [
                item.syntaxTag,
                item.semanticsTags,
                item.phonologyTags,
                item.pragmaticsTag,
                item.timestampRange
            ].filter(Boolean).join(' ');
            return [
                item.quote,
                item.pinyin,
                item.translation,
                item.grammar,
                item.explanation,
                item.deepDive,
                item.funFact,
                item.character,
                item.speakerCode,
                item.drama,
                item.tone,
                item.context,
                item.practice,
                item.activity,
                item.episodeTime,
                item.language,
                indexParts,
                ...(item.sentenceTypes || []),
                ...tagIds,
                ...tagLabels
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function getTagIdsMatchingQuery(query) {
            const q = query.trim().toLowerCase();
            if (!q) return [];
            const ids = new Set();
            for (const [id, label] of Object.entries(LT_LABELS)) {
                if (label.toLowerCase().includes(q) || id.toLowerCase().includes(q)) ids.add(id);
            }
            for (const cat of GRAMMAR_MENU) {
                if (cat.label.toLowerCase().includes(q) || (cat.en && cat.en.toLowerCase().includes(q))) {
                    cat.items.forEach(i => ids.add(i.id));
                }
            }
            return [...ids];
        }

        function itemMatchesSearchQuery(item, query) {
            const q = query.trim();
            if (!q) return true;
            const ql = q.toLowerCase();
            const hay = getItemSearchHaystack(item);
            const tokens = ql.split(/\s+/).filter(Boolean);
            const textHit = tokens.length
                ? tokens.some(token => hay.includes(token))
                : hay.includes(ql);
            if (textHit) return true;
            const matchingTagIds = getTagIdsMatchingQuery(q);
            if (!matchingTagIds.length) return false;
            const itemTags = getLinguisticTags(item);
            return matchingTagIds.some(tid => itemTags.includes(tid));
        }

        function inferPragTag(item) {
            const tone = item.tone || '';
            const ctx = item.context || '';
            const types = item.sentenceTypes || [];
            if (types.includes('諺語')) return 'prag-idiom';
            if (tone === '悲傷') return 'prag-sad';
            if (['生氣', '瘋狂'].includes(tone) || ctx === '吵架') return 'prag-angry';
            if (['快樂', '溫暖'].includes(tone) || ctx === '安慰' || ctx === '歡樂慶祝') return 'prag-happy';
            if (['諷刺', '冷淡'].includes(tone) || ctx === '親密揶揄') return 'prag-sarcasm';
            if (tone === '疑惑' || ctx === '理性討論') return 'prag-shock';
            if (ctx === '日常對話交流' || tone === '平靜') return 'prag-happy';
            return null;
        }

        function inferLinguisticTags(item) {
            if (item.linguisticTags && item.linguisticTags.length) return [...item.linguisticTags];
            const tags = new Set();
            const q = item.quote || '';
            const g = (item.grammar || '') + ' ' + (item.explanation || '') + ' ' + (item.deepDive || '');
            const p = item.pinyin || '';

            if (/共/.test(q) && /拖|拍|弄|提|搶|聽/.test(q + g)) tags.add('kā-disposal');
            if (/共[你伊]|共我|共伊|共這|共彼/.test(q) || /「共」|處置式「共」|引介動作對象/.test(g)) tags.add('kā-target');
            if (/予/.test(q) && /[人伊]|地下|錢莊/.test(q)) tags.add('hōo-passive');
            if (/予/.test(q) && /做|去|食|講/.test(q)) tags.add('hōo-causative');
            if (/較|愈.*愈|khah/.test(q + g + p)) tags.add('comparative');
            if (/袂|會得|ē-tit|buē/.test(q + g + p)) tags.add('potential');
            if (/甲/.test(q) || /程度|結果補語/.test(g)) tags.add('extent-comp');
            if (/若|假使|欲.*著愛|nā|ká-sú|beh/.test(q + g + p)) tags.add('conditionals');
            if (/矣|--ah|清矣|過去矣/.test(q + g + p)) tags.add('aspect-perf');
            if (/咧|--leh|teh/.test(q + g + p)) tags.add('aspect-cont');
            if (/未|猶未|buē/.test(q + g + p)) tags.add('aspect-neg');
            if (/莫|袂使|mài|buē-sái/.test(q + g + p)) tags.add('modal-neg');
            if (/仔|gín-á|-á/.test(q + g + p)) tags.add('diminutive-a');
            if (/出來|轉來|tshut-lâi|tńg-lâi|趨向/.test(q + g + p)) tags.add('directional');
            if (/--/.test(p) || /輕聲/.test(g + p)) tags.add('neutral-tone');
            if (/合音|buāi|gún|lín|阮|恁/.test(q + g + p)) tags.add('contraction');
            if (/(.)\1|疊/.test(q) || /疊詞|疊字/.test(g)) tags.add('reduplication');
            if (/[ptkh]\b|入聲|tsia̍t|kip/.test(p + g)) tags.add('checked-tone');
            if (/文白|兩讀|ji̍t/.test(g + p)) tags.add('literary-coll');

            const prag = inferPragTag(item);
            if (prag) tags.add(prag);
            return [...tags];
        }

        function getLinguisticTags(item) {
            return inferLinguisticTags(item);
        }

        let currentFilters = {
            episode: '1', difficulty: '',
            linguisticTags: [], searchGrammar: ''
        };
        let searchModeActive = false;
        let browsePool = [];
        let sidebarCollapsed = false;

        function getQuoteEpisode(item) {
            if (item.episode != null) return item.episode;
            const m = (item.episodeTime || '').match(/第\s*(\d+)\s*集/);
            return m ? parseInt(m[1], 10) : null;
        }
        let activeQuote = dramaQuotesDatabase.find(q => q.drama === '夜市人生') || dramaQuotesDatabase[0];

        function getNightMarketQuotes() {
            return dramaQuotesDatabase.filter(q => q.drama === '夜市人生');
        }
        let quizState = { selected: null, index: 0 };

        const YOUTUBE_VIDEO_ID = 'QJhEkjmgwis';
        const YOUTUBE_THUMB_URL = `https://i.ytimg.com/vi/${YOUTUBE_VIDEO_ID}/hqdefault.jpg`;
        let youtubePlayer = null;
        let pendingYouTubeSeekSec = 0;
        let youtubeUsesEmbed = false;

        function canEmbedYouTube() {
            return location.protocol === 'http:' || location.protocol === 'https:';
        }

        function getYouTubeStartForQuote(quote) {
            if (!quote) return 0;
            if (quote.youtubeStart != null) return quote.youtubeStart;
            if (quote.audioStart != null) return quote.audioStart;
            const range = quote.timestampRange || '';
            const rm = range.match(/(\d{2}):(\d{2}):(\d{2})/);
            if (rm) {
                return parseInt(rm[1], 10) * 3600 + parseInt(rm[2], 10) * 60 + parseInt(rm[3], 10);
            }
            const m = (quote.episodeTime || '').match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
            if (m) {
                const h = m[3] != null ? parseInt(m[1], 10) : 0;
                const min = m[3] != null ? parseInt(m[2], 10) : parseInt(m[1], 10);
                const sec = m[3] != null ? parseInt(m[3], 10) : parseInt(m[2], 10);
                return h * 3600 + min * 60 + sec;
            }
            return 0;
        }

        function formatYouTubeTimeLabel(totalSec) {
            const sec = Math.max(0, Math.floor(totalSec));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function getYouTubeWatchUrl(seconds) {
            return `https://www.youtube.com/watch?v=${YOUTUBE_VIDEO_ID}&t=${Math.max(0, Math.floor(seconds))}`;
        }

        function updateYouTubeFallbackLink(seconds) {
            const url = getYouTubeWatchUrl(seconds);
            const label = formatYouTubeTimeLabel(seconds);
            const fallback = document.getElementById('youtube-fallback-link');
            if (fallback) {
                fallback.href = url;
                fallback.innerHTML = `<i class="fa-brands fa-youtube"></i> 在 YouTube 觀看此段（從 ${label} 起）`;
            }
            const previewLink = document.getElementById('youtube-preview-link');
            const previewTime = document.getElementById('youtube-preview-time');
            if (previewLink) previewLink.href = url;
            if (previewTime) previewTime.textContent = `從 ${label} 起在 YouTube 播放`;
        }

        function seekYouTubeToQuote(quote) {
            const sec = getYouTubeStartForQuote(quote);
            pendingYouTubeSeekSec = sec;
            updateYouTubeFallbackLink(sec);
            if (!youtubeUsesEmbed || !youtubePlayer || typeof youtubePlayer.cueVideoById !== 'function') return;
            youtubePlayer.cueVideoById({
                videoId: YOUTUBE_VIDEO_ID,
                startSeconds: Math.floor(sec)
            });
        }

        function initYouTubePlayerMode() {
            const embedHost = document.getElementById('youtube-embed-host');
            const previewHost = document.getElementById('youtube-preview-host');
            const fallbackWrap = document.getElementById('youtube-fallback-wrap');
            const thumb = document.getElementById('youtube-preview-thumb');

            if (thumb && !thumb.getAttribute('src')) thumb.src = YOUTUBE_THUMB_URL;

            if (canEmbedYouTube()) {
                youtubeUsesEmbed = true;
                embedHost?.classList.remove('hidden');
                previewHost?.classList.add('hidden');
                fallbackWrap?.classList.add('hidden');
                loadYouTubeIframeApi();
                return;
            }

            youtubeUsesEmbed = false;
            embedHost?.classList.add('hidden');
            previewHost?.classList.remove('hidden');
            fallbackWrap?.classList.add('hidden');
        }

        function loadYouTubeIframeApi() {
            if (window.YT && window.YT.Player) {
                initYouTubeIframePlayer();
                return;
            }
            if (document.getElementById('youtube-iframe-api-script')) return;
            const script = document.createElement('script');
            script.id = 'youtube-iframe-api-script';
            script.src = 'https://www.youtube.com/iframe_api';
            document.body.appendChild(script);
        }

        function initYouTubeIframePlayer() {
            if (youtubePlayer || !canEmbedYouTube()) return;
            const playerVars = {
                rel: 0,
                modestbranding: 1,
                playsinline: 1,
                enablejsapi: 1
            };
            if (location.protocol.startsWith('http')) {
                playerVars.origin = location.origin;
            }

            youtubePlayer = new YT.Player('youtube-player', {
                videoId: YOUTUBE_VIDEO_ID,
                width: '100%',
                height: '100%',
                playerVars,
                events: {
                    onReady: (event) => {
                        event.target.cueVideoById({
                            videoId: YOUTUBE_VIDEO_ID,
                            startSeconds: Math.floor(pendingYouTubeSeekSec)
                        });
                    }
                }
            });
        }

        window.onYouTubeIframeAPIReady = function() {
            initYouTubeIframePlayer();
        };

        function initPragmaticsMenu() {
            const pragEl = document.getElementById('pragmatics-menu');
            pragEl.innerHTML = PRAGMATICS_MENU.map(item => `
                <button type="button" id="btn-lt-${item.id}" class="prag-btn" onclick="toggleLinguisticTag('${item.id}')">${item.label}</button>
            `).join('');
        }

        function initGrammarMenu() {
            const menuEl = document.getElementById('grammar-menu');
            menuEl.innerHTML = GRAMMAR_MENU.map(cat => `
                <div class="grammar-cat" id="grammar-cat-${cat.id}">
                    <button type="button" class="grammar-cat-btn" onclick="toggleGrammarCategory('${cat.id}')">
                        <span><span class="block">【${cat.label}】</span><span class="cat-en">${cat.en}</span></span>
                        <i class="fa-solid fa-chevron-down cat-chevron"></i>
                    </button>
                    <div class="grammar-cat-items">
                        ${cat.items.map(item => `
                            <button type="button" id="btn-lt-${item.id}" class="grammar-check" onclick="toggleLinguisticTag('${item.id}')">
                                <span class="grammar-check-box" aria-hidden="true"></span>
                                <span class="grammar-check-label">${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            const syntaxCat = document.getElementById('grammar-cat-syntax');
            if (syntaxCat) syntaxCat.classList.add('is-open');
        }

        function toggleGrammarCategory(catId) {
            const el = document.getElementById(`grammar-cat-${catId}`);
            if (el) el.classList.toggle('is-open');
        }

        function toggleAsidePanel(panelId) {
            const el = document.getElementById(`aside-toggle-${panelId}`);
            if (!el) return;
            el.classList.toggle('is-open');
            const btn = el.querySelector('.aside-toggle-bar');
            if (btn) btn.setAttribute('aria-expanded', el.classList.contains('is-open'));
        }

        function toggleSidebar() {
            sidebarCollapsed = !sidebarCollapsed;
            const sidebar = document.getElementById('grammar-sidebar');
            const pageLayout = document.querySelector('.page-layout');
            const toggleBtn = document.getElementById('sidebar-toggle');
            sidebar.classList.toggle('is-collapsed', sidebarCollapsed);
            if (pageLayout) pageLayout.classList.toggle('sidebar-collapsed-layout', sidebarCollapsed);
            if (toggleBtn) {
                toggleBtn.innerHTML = sidebarCollapsed
                    ? '<i class="fa-solid fa-chevron-right"></i>'
                    : '<i class="fa-solid fa-chevron-left"></i>';
            }
        }

        function syncLinguisticTagButtons() {
            document.querySelectorAll('.grammar-check').forEach(btn => {
                const id = btn.id.replace('btn-lt-', '');
                btn.classList.toggle('is-checked', currentFilters.linguisticTags.includes(id));
            });
            document.querySelectorAll('.prag-btn').forEach(btn => {
                const id = btn.id.replace('btn-lt-', '');
                btn.classList.toggle('is-active', currentFilters.linguisticTags.includes(id));
            });
        }

        function clearGrammarSelections() {
            const grammarIds = new Set(GRAMMAR_MENU.flatMap(c => c.items.map(i => i.id)));
            currentFilters.linguisticTags = currentFilters.linguisticTags.filter(t => !grammarIds.has(t));
            syncLinguisticTagButtons();
            showToast('已取消文法考點選取');
        }

        function toggleLinguisticTag(tagCode) {
            const idx = currentFilters.linguisticTags.indexOf(tagCode);
            if (idx >= 0) currentFilters.linguisticTags.splice(idx, 1);
            else currentFilters.linguisticTags.push(tagCode);
            syncLinguisticTagButtons();
        }

        function hasActiveFilters() {
            return !!(currentFilters.linguisticTags.length ||
                currentFilters.searchGrammar.trim() ||
                currentFilters.episode !== 'all');
        }

        function updateSearchBanner(count) {
            const banner = document.getElementById('search-result-banner');
            if (!banner) return;
            if (!searchModeActive || !hasActiveFilters()) {
                banner.classList.add('hidden');
                banner.classList.remove('is-empty');
                banner.innerHTML = '';
                return;
            }
            banner.classList.remove('hidden');
            banner.classList.toggle('is-empty', !count);
            const tags = currentFilters.linguisticTags.map(t => LT_LABELS[t] || t).join(' ＋ ');
            const parts = [];
            if (currentFilters.episode !== 'all') parts.push(`EP${currentFilters.episode}`);
            if (tags) parts.push(tags);
            if (currentFilters.searchGrammar.trim()) parts.push(`「${currentFilters.searchGrammar.trim()}」`);
            const countLabel = count ? `搜尋結果 ${count} 筆` : '無符合條件';
            const detail = parts.join(' · ');
            banner.innerHTML = `
                <span class="search-banner-icon" aria-hidden="true"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="search-banner-body">
                    <span class="search-banner-count">${escapeHtml(countLabel)}</span>
                    ${detail ? `<span class="search-banner-detail">${escapeHtml(detail)}</span>` : ''}
                </span>
            `;
        }

        function createSearchResultItem(item, isSelected) {
            const el = document.createElement('div');
            el.className = `search-result-item${isSelected ? ' is-selected' : ''}`;
            el.dataset.quoteId = item.id;
            el.onclick = () => setActiveQuote(item, { refreshPool: false });

            const tw = document.createElement('p');
            tw.className = 'search-result-tw';
            tw.textContent = item.quote;

            const rom = document.createElement('p');
            rom.className = 'search-result-rom';
            rom.textContent = item.pinyin || '';

            const zh = document.createElement('p');
            zh.className = 'search-result-zh';
            zh.textContent = item.translation || '';

            el.append(tw, rom, zh);
            return el;
        }

        function getBrowsePoolItems() {
            const nm = getNightMarketQuotes();
            let pool;
            if (searchModeActive && hasActiveFilters()) {
                pool = nm.filter(matchesFilters);
            } else if (currentFilters.episode !== 'all') {
                const ep = parseInt(currentFilters.episode, 10);
                pool = nm.filter(q => getQuoteEpisode(q) === ep);
            } else {
                pool = [...nm];
            }
            return pool.sort((a, b) => (getYouTubeStartForQuote(a) - getYouTubeStartForQuote(b)) || a.id - b.id);
        }

        function refreshBrowsePool() {
            setBrowsePool(getBrowsePoolItems());
        }

        function setBrowsePool(items) {
            browsePool = items.length ? [...items] : [];
            updateQuoteNavButtons();
        }

        function syncQuoteListSelection() {
            document.querySelectorAll('#quotes-list-container .search-result-item').forEach(el => {
                const id = parseInt(el.dataset.quoteId, 10);
                el.classList.toggle('is-selected', id === activeQuote.id);
            });
        }

        function updateQuoteNavButtons() {
            const prevBtn = document.getElementById('btn-prev-quote');
            const nextBtn = document.getElementById('btn-next-quote');
            if (!prevBtn || !nextBtn) return;
            const idx = browsePool.findIndex(q => q.id === activeQuote.id);
            const canNav = browsePool.length > 1 && idx >= 0;
            prevBtn.disabled = !canNav || idx <= 0;
            nextBtn.disabled = !canNav || idx >= browsePool.length - 1;
            updateBrowseCount();
        }

        function updateBrowseCount() {
            const el = document.getElementById('browse-count-text');
            if (!el) return;
            const total = browsePool.length;
            if (!total) {
                el.textContent = '';
                return;
            }
            const idx = browsePool.findIndex(q => q.id === activeQuote.id);
            el.textContent = idx >= 0 ? `${idx + 1}/${total}` : '';
        }

        function prevQuote() {
            const idx = browsePool.findIndex(q => q.id === activeQuote.id);
            if (idx > 0) setActiveQuote(browsePool[idx - 1], { refreshPool: false });
        }

        function nextQuote() {
            const idx = browsePool.findIndex(q => q.id === activeQuote.id);
            if (idx >= 0 && idx < browsePool.length - 1) setActiveQuote(browsePool[idx + 1], { refreshPool: false });
        }

        function renderQuoteList(items) {
            const listContainer = document.getElementById('quotes-list-container');
            listContainer.innerHTML = '';
            if (!items.length) {
                const notice = document.createElement('div');
                notice.className = 'text-center py-4 nm-muted text-xs border-2 border-dashed border-nm-orange rounded-xl font-bold';
                notice.textContent = '無符合條件金句';
                listContainer.appendChild(notice);
                return;
            }
            items.forEach(item => listContainer.appendChild(createSearchResultItem(item, item.id === activeQuote.id)));
        }

        function handleHeaderSearchSubmit(event) {
            if (event) event.preventDefault();
            const input = document.getElementById('header-search');
            if (input?.dataset.composing === '1') return false;
            executeSearch();
            return false;
        }

        function initHeaderSearch() {
            const input = document.getElementById('header-search');
            if (!input) return;
            input.addEventListener('compositionstart', () => {
                input.dataset.composing = '1';
            });
            input.addEventListener('compositionend', () => {
                delete input.dataset.composing;
            });
            input.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' || event.isComposing || input.dataset.composing === '1') return;
                event.preventDefault();
                handleHeaderSearchSubmit(event);
            });
        }

        function handleSidebarSearchSubmit(event) {
            if (event) event.preventDefault();
            executeSearch();
            return false;
        }

        function initSidebarSearch() {
            const form = document.getElementById('sidebar-filter-form');
            if (!form) return;
            form.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' || event.isComposing) return;
                event.preventDefault();
                executeSearch();
            }, true);
        }

        function executeSearch() {
            applyFilters();
            searchModeActive = true;
            const pool = getNightMarketQuotes().filter(matchesFilters);
            updateSearchBanner(pool.length);
            if (pool.length) {
                setBrowsePool(pool);
                setActiveQuote(pool[0], { refreshPool: false });
                renderQuoteList(pool);
                showToast(`找到 ${pool.length} 筆金句`);
            } else {
                setBrowsePool([]);
                renderQuoteList(pool);
                showToast('找不到符合條件的金句');
            }
        }

        let appInitialized = false;

        function syncSearchInputs(value) {
            const header = document.getElementById('header-search');
            if (header) header.value = value ?? '';
        }

        function applySearchQuery(searchQuery) {
            if (!searchQuery) return;
            syncSearchInputs(searchQuery);
            executeSearch();
        }

        function initLearnApp() {
            appInitialized = true;
            initHeaderSearch();
            initSidebarSearch();
            initPragmaticsMenu();
            initGrammarMenu();
            document.getElementById('select-episode').value = '1';
            currentFilters.episode = '1';
            const ep1Quotes = getNightMarketQuotes()
                .filter(q => getQuoteEpisode(q) === 1)
                .sort((a, b) => getYouTubeStartForQuote(a) - getYouTubeStartForQuote(b));
            const ep1Default = ep1Quotes[0]
                || dramaQuotesDatabase.find(q => q.drama === '夜市人生')
                || dramaQuotesDatabase[0];
            initYouTubePlayerMode();
            setActiveQuote(ep1Default);
            updateYouTubeFallbackLink(getYouTubeStartForQuote(ep1Default));
        }

        window.onload = function() {
            if (!appInitialized) initLearnApp();
            const q = new URLSearchParams(location.search).get('q');
            if (q) applySearchQuery(q);
        };

        function getDifficultyLabel(quote) {
            return quote.difficulty === 'Beginner' ? '初級' : quote.difficulty === 'Intermediate' ? '中級' : '高級';
        }

        function getComparableTags(quote) {
            return getLinguisticTags(quote);
        }

        function countTagOverlap(q1, q2) {
            const tags2 = new Set(getComparableTags(q2));
            return getComparableTags(q1).filter(t => tags2.has(t)).length;
        }

        function renderQuoteTags() {
            const container = document.getElementById('quote-tags-container');
            if (!container) return;
            container.innerHTML = renderLinguisticTagChips(activeQuote);
        }

        function renderTreasureBox() {
            const nmQuotes = getNightMarketQuotes();
            if (searchModeActive && hasActiveFilters()) {
                const pool = nmQuotes.filter(matchesFilters);
                updateSearchBanner(pool.length);
                renderQuoteList(pool);
                return;
            }

            updateSearchBanner(0);
            const others = nmQuotes.filter(q => q.id !== activeQuote.id);
            const similar = others
                .map(q => ({ quote: q, score: countTagOverlap(activeQuote, q) }))
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .map(x => x.quote);

            if (similar.length === 0) {
                const shuffled = [...others].sort(() => Math.random() - 0.5);
                renderQuoteList(shuffled);
                return;
            }

            renderQuoteList(similar);
        }

        function setFilterChipState(btn, active) {
            btn.classList.toggle('is-active', active);
        }

        function matchesFilters(item) {
            if (item.drama !== '夜市人生') return false;
            if (currentFilters.episode !== 'all') {
                const ep = getQuoteEpisode(item);
                if (ep !== parseInt(currentFilters.episode, 10)) return false;
            }
            if (currentFilters.difficulty && item.difficulty !== currentFilters.difficulty) return false;
            if (currentFilters.linguisticTags.length) {
                const itemTags = getLinguisticTags(item);
                const matchesAll = currentFilters.linguisticTags.every(t => itemTags.includes(t));
                if (!matchesAll) return false;
            }
            if (currentFilters.searchGrammar) {
                if (!itemMatchesSearchQuery(item, currentFilters.searchGrammar)) return false;
            }
            return true;
        }

        function setActiveQuote(quote, options = {}) {
            const { refreshPool = true } = options;
            activeQuote = quote;

            renderQuoteTags();
            renderDeepDiveTable(quote);
            document.getElementById('ai-practice').textContent = quote.practice;
            document.getElementById('ai-activity').textContent = quote.activity;
            const timeLabel = [quote.episodeTime, quote.timestampRange].filter(Boolean).join(' · ');
            document.getElementById('mock-video-time').textContent = timeLabel || '';

            seekYouTubeToQuote(quote);

            renderCardText();
            renderTreasureBox();
            if (refreshPool) {
                refreshBrowsePool();
            } else {
                syncQuoteListSelection();
                updateQuoteNavButtons();
            }
            buildQuiz();
        }

        function parseQuoteForCard(quote, pinyin) {
            const chars = [...quote];
            const syllables = pinyin.replace(/[，。！？、；：「」『』？]/g, ' ').split(/\s+/).filter(Boolean);
            const result = [];
            let si = 0;
            for (const ch of chars) {
                if (/[\s，。！？、；：「」『』？,.\-]/.test(ch)) {
                    result.push({ char: ch, py: '', punct: true });
                } else {
                    result.push({ char: ch, py: syllables[si] || '', punct: false });
                    si++;
                }
            }
            return result;
        }

        function renderCardText() {
            document.getElementById('card-display-tw').textContent = activeQuote.quote || '';
            document.getElementById('card-display-rom').textContent = activeQuote.pinyin || '';
            document.getElementById('card-display-zh').textContent = activeQuote.translation || '';
        }

        function drawCardCanvas() {
            const canvas = document.getElementById('canvas-card');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const pairs = parseQuoteForCard(activeQuote.quote, activeQuote.pinyin);
            const charCount = pairs.filter(p => !p.punct).length;

            let mainSize = 25, pySize = 14, transSize = 18, charW = 38, lineH = 56, punctW = 14;
            if (charCount > 10) { mainSize = 22; pySize = 13; charW = 34; lineH = 52; }
            if (charCount > 14) { mainSize = 18; pySize = 11; charW = 30; lineH = 46; transSize = 16; }
            if (charCount > 20) { mainSize = 15; pySize = 10; charW = 26; lineH = 40; transSize = 15; }
            if (charCount <= 8) { mainSize = 28; pySize = 16; charW = 42; lineH = 60; }

            const margin = 20;
            let row = 0, cx = margin;
            const rows = [0];
            pairs.forEach(p => {
                const wCell = p.punct ? punctW : charW;
                if (cx + wCell > w - margin) { row++; cx = margin; rows[row] = row; }
                cx += wCell;
            });
            const totalRows = row + 1;
            const transLines = activeQuote.translation.length > 22 ? 2 : 1;
            const contentH = totalRows * lineH + 36 + transLines * 24;
            const h = Math.max(140, contentH + 32);
            canvas.height = h;

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#fff9c4');
            grad.addColorStop(0.5, '#ffecb3');
            grad.addColorStop(1, '#ffe082');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = '#d32f2f';
            ctx.lineWidth = 4;
            ctx.strokeRect(6, 6, w - 12, h - 12);

            const mainColor = '#c62828';
            const transColor = '#4e342e';
            const blockTop = (h - contentH) / 2 + 8;

            row = 0;
            cx = margin;
            pairs.forEach(p => {
                const wCell = p.punct ? punctW : charW;
                if (cx + wCell > w - margin) { row++; cx = margin; }
                const y = blockTop + row * lineH;
                ctx.textAlign = 'center';
                if (!p.punct) {
                    ctx.font = `900 ${mainSize}px "Noto Sans TC", sans-serif`;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    ctx.strokeText(p.char, cx + wCell / 2, y);
                    ctx.fillStyle = mainColor;
                    ctx.fillText(p.char, cx + wCell / 2, y);
                    ctx.font = `700 ${pySize}px monospace`;
                    ctx.fillStyle = '#2e7d32';
                    ctx.fillText(p.py, cx + wCell / 2, y + mainSize * 0.75);
                } else {
                    ctx.font = `900 ${mainSize}px "Noto Sans TC", sans-serif`;
                    ctx.fillStyle = mainColor;
                    ctx.fillText(p.char, cx + punctW / 2, y);
                }
                cx += wCell;
            });

            const transY = blockTop + totalRows * lineH + 20;
            ctx.fillStyle = transColor;
            ctx.font = `${transSize}px "Noto Sans TC", sans-serif`;
            ctx.textAlign = 'center';
            wrapCanvasText(ctx, activeQuote.translation, w / 2, transY, w - margin * 2, transSize + 6);
        }

        function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
            const chars = [...text];
            let line = '', lines = [];
            for (const ch of chars) {
                const test = line + ch;
                if (ctx.measureText(test).width > maxWidth && line) {
                    lines.push(line);
                    line = ch;
                } else {
                    line = test;
                }
            }
            if (line) lines.push(line);
            lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
        }

        function downloadCardImage() {
            drawCardCanvas();
            const canvas = document.getElementById('canvas-card');
            const link = document.createElement('a');
            link.download = `${activeQuote.drama}_${activeQuote.character}_字卡.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            document.body.appendChild(link);
            link.click();
            link.remove();
            showToast('已下載字卡圖片');
        }
        
        function applyFilters() {
            currentFilters.episode = document.getElementById('select-episode').value;
            const query = (document.getElementById('header-search')?.value ?? '').trim();
            syncSearchInputs(query);
            currentFilters.searchGrammar = query;
        }

        function resetFilters() {
            currentFilters = { episode: '1', difficulty: '', linguisticTags: [], searchGrammar: '' };
            searchModeActive = false;
            document.getElementById('select-episode').value = '1';
            syncSearchInputs('');
            syncLinguisticTagButtons();
            applyFilters();
            updateSearchBanner(0);
            const ep1 = dramaQuotesDatabase.find(q => q.id === 30) || getNightMarketQuotes().filter(matchesFilters)[0];
            if (ep1) setActiveQuote(ep1);
            showToast('篩選已重設（EP1）');
        }

        function triggerRandomQuote() {
            const filtered = getNightMarketQuotes().filter(matchesFilters);
            const pool = filtered.length ? filtered : getNightMarketQuotes();
            setActiveQuote(pool[Math.floor(Math.random() * pool.length)]);
            showToast('已隨機載入金句');
        }

        function generateAIWorksheet() {
            document.getElementById('ai-practice').textContent =
                `請用「${activeQuote.quote.slice(0, 6)}…」延伸造句，並標註台羅拼音。`;
            document.getElementById('ai-activity').textContent =
                `兩人一組：一人唸出「${activeQuote.quote}」（${activeQuote.tone}語氣），另一人用華語解釋並討論適用情境「${activeQuote.context}」。`;
            showToast('已重新生成延伸教材');
        }

        function buildQuiz() {
            const others = getNightMarketQuotes().filter(x => x.id !== activeQuote.id);
            const wrong = others.sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.translation);
            const options = [activeQuote.translation, ...wrong].sort(() => Math.random() - 0.5);
            quizState.selected = null;
            quizState.options = options;
            document.getElementById('quiz-prompt').textContent =
                `【測驗】以下哪一項是「${activeQuote.quote}」的正確華語翻譯？`;
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'quiz-opt nm-chip text-left text-xs p-3 rounded-xl w-full';
                btn.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
                btn.onclick = () => {
                    quizState.selected = opt;
                    document.querySelectorAll('.quiz-opt').forEach(b => b.classList.remove('is-active'));
                    btn.classList.add('is-active');
                };
                container.appendChild(btn);
            });
            document.getElementById('quiz-feedback').textContent = '';
        }

        function checkQuizAnswer() {
            const fb = document.getElementById('quiz-feedback');
            if (!quizState.selected) {
                fb.textContent = '請先選擇答案';
                fb.className = 'text-xs text-nm-orange font-black';
                return;
            }
            if (quizState.selected === activeQuote.translation) {
                fb.textContent = '✓ 答對了！';
                fb.className = 'text-xs text-nm-green font-black';
            } else {
                fb.textContent = '✗ 再試一次';
                fb.className = 'text-xs text-nm-red font-black';
            }
        }

        function nextQuiz() {
            const filtered = getNightMarketQuotes().filter(matchesFilters);
            const pool = filtered.length ? filtered : getNightMarketQuotes();
            const next = pool[Math.floor(Math.random() * pool.length)];
            setActiveQuote(next);
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast-box');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
